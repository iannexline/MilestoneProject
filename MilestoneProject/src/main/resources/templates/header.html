<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="header">
  <nav class="navbar navbar-expand-lg" style="background:#0f0f0f; border-bottom: 3px solid #f9c8d4;">
    <div class="container">

      <!-- VARO Logo -->
      <a class="navbar-brand" th:href="@{/}" style="font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:0.15em; color:#ffffff;">
        VAR<span style="color:#f9c8d4;">O</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" style="border-color:#f9c8d4;">

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto gap-2 align-items-center">
          <li class="nav-item">

          <li class="nav-item">

        </ul>

    </div>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
