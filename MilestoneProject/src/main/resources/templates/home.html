<!DOCTYPE html>
<html layout:decorate="~{common}" xmlns:th="http://www.thymeleaf.org">

<div layout:fragment="content">

	<div class="row justify-content-center">
		<div class="col-md-6">
			<div class="brand-card p-4 text-center">
				<h2 class="brand-title">Welcome</h2>
				<p>Logged in as: <b th:text="${username}"></b></p>
				<a th:href="@{/logout}" class="btn brand-btn mt-3">Logout</a>
			</div>
		</div>
	</div>

	<!-- Products Section -->
	<div class="row justify-content-center mt-4">
		<div class="col-md-10">
			<div class="brand-card p-4">
				<h3 class="brand-title text-center mb-4">Products</h3>

				<div th:if="${products == null or #lists.isEmpty(products)}" class="text-center">
					<p>No products available.</p>
				</div>

				<div th:if="${products != null and !#lists.isEmpty(products)}">
					<table class="table table-striped table-bordered">
						<thead>
							<tr>
								<th>Name</th>
								<th>Description</th>
								<th>Price</th>
								<th>Quantity</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="product : ${products}">
								<td th:text="${product.name}"></td>
								<td th:text="${product.description}"></td>
								<td th:text="${product.price}"></td>
								<td th:text="${product.quantity}"></td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>
</div>

</html>
