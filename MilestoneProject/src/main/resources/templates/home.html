<!DOCTYPE html>
<html layout:decorate="~{common}" xmlns:th="http://www.thymeleaf.org">

<div layout:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="brand-card p-4 text-center">
                <h2 class="brand-title">Welcome</h2>

                <p>
                    Logged in as:
                    <b th:text="${username}"></b>
                </p>

                <div class="d-grid gap-2 mt-4">
                    <a th:href="@{/products}" class="btn brand-btn">
                        View Products
                    </a>

				<div th:if="${products != null and !#lists.isEmpty(products)}">
					<table class="table table-striped table-bordered">
						<thead>
							<tr>
								<th>Name</th>
								<th>Description</th>
								<th>Price</th>
								<th>Quantity</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="product : ${products}">
								<td th:text="${product.name}"></td>
								<td th:text="${product.description}"></td>
								<td th:text="${#numbers.formatDecimal(product.price,1,2)}"></td>
								<td th:text="${product.quantity}"></td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>
=======
                    <a th:href="@{/products/new}" class="btn brand-btn">
                        Add New Product
                    </a>
                </div>

                <a th:href="@{/logout}" class="btn btn-outline-dark mt-3">
                    Logout
                </a>
            </div>
  

    <!-- Products Section -->
    <div class="row justify-content-center mt-4">
        <div class="col-md-10">
            <div class="brand-card p-4">
                <h3 class="brand-title text-center mb-4">Products</h3>

                <div th:if="${products == null or #lists.isEmpty(products)}" class="text-center">
                    <p>No products available.</p>
                </div>

                <div th:if="${products != null and !#lists.isEmpty(products)}">
                    <table class="table table-striped table-bordered">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Price</th>
                                <th>Quantity</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="product : ${products}">
                                <td th:text="${product.name}"></td>
                                <td th:text="${product.description}"></td>
                                <td th:text="${product.price}"></td>
                                <td th:text="${product.quantity}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</html>
