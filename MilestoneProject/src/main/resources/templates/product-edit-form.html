<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Product</title>
</head>
<body>
    <h2>Edit Product</h2>

    <form th:action="@{/products/update}" th:object="${product}" method="post">
        <input type="hidden" th:field="*{id}" />

        <label>Name:</label>
        <input type="text" th:field="*{name}" /><br><br>

        <label>Description:</label>
        <input type="text" th:field="*{description}" /><br><br>

        <label>Price:</label>
        <input type="text" th:field="*{price}" /><br><br>

        <label>Quantity:</label>
        <input type="text" th:field="*{quantity}" /><br><br>

        <button type="submit">Update Product</button>
    </form>
</body>
</html>
