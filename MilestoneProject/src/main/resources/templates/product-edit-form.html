<!DOCTYPE html>
<html layout:decorate="~{common}" xmlns:th="http://www.thymeleaf.org">

<div layout:fragment="content">

    <div class="row justify-content-center mt-4">
        <div class="col-md-6">
            <div class="brand-card p-4">
                <h2 class="brand-title text-center mb-4">Edit Product</h2>

                <form th:action="@{/products/update}" th:object="${product}" method="post">
                    <input type="hidden" th:field="*{id}" />

                    <input class="form-control mb-2" th:field="*{name}" placeholder="Product Name">

                    <input class="form-control mb-2" th:field="*{description}" placeholder="Description">

                    <input class="form-control mb-2" th:field="*{price}" placeholder="Price">

                    <input class="form-control mb-3" th:field="*{quantity}" placeholder="Quantity">

                    <button type="submit" class="btn brand-btn w-100">Update Product</button>

                    <a th:href="@{/products}" class="btn btn-outline-dark w-100 mt-2">Cancel</a>

                </form>

            </div>
        </div>
    </div>

</div>

</html>
