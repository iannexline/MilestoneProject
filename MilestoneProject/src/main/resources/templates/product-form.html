<!DOCTYPE html>
<html layout:decorate="~{common}" xmlns:th="http://www.thymeleaf.org">

<div layout:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="brand-card p-4">
                <h2 class="brand-title text-center mb-4">Add New Product</h2>

                <form th:action="@{/products/create}" th:object="${product}" method="post">

                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input type="text" class="form-control" th:field="*{name}" placeholder="Enter product name" />
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" th:field="*{description}" rows="4" placeholder="Enter product description"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Price</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{price}" placeholder="Enter price" />
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Quantity</label>
                        <input type="number" class="form-control" th:field="*{quantity}" placeholder="Enter quantity" />
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn brand-btn">Save Product</button>
                        <a th:href="@{/home}" class="btn btn-outline-dark">Cancel</a>
                    </div>

                </form>
            </div>
        </div>
    </div>

</div>

</html>
